dataset:
  name: popqa
  family: qa
  source: akariasai/PopQA
  metric: answer_accuracy
  split_rule:
    valid: "test[6000:7000]"
    test: "test[7000:]"
  sampling:
    default_runner_strategy: ordered
    main_eval_strategy: stratified_by_prop
    seed: 42
  search:
    retriever: Search-R1 wiki-18 e5
    topk: 3

model:
  load_model_path: null
  mas:
    structure: autogen
    supported_structures: [autogen, camel, macnet]
    llm_name_or_path: Qwen/Qwen3-4B-Instruct-2507

run:
  seed: 42
  working_dir: null
  device: 0
  mode: eval
  generation:
    max_new_tokens: 512
    do_sample: false
    temperature: 0.0
    early_stopping: true
    use_cache: true
  interaction:
    batch_size: 16
    max_turns: 5
    max_obs_length: 2048
