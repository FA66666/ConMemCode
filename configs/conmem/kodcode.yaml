dataset:
  name: kodcode
  source: KodCode/KodCode-Light-RL-10K
  split_rule:
    valid: "builder split with seed=42, valid size = 1000"
    test: "builder split with seed=42, test size = 2000"
  metric: pass_rate

model:
  load_model_path: null
  mas:
    structure: autogen
    supported_structures: [single, autogen, camel, macnet]
    llm_name_or_path: Qwen/Qwen3-4B-Instruct-2507

run:
  seed: 42
  working_dir: null
  device: 0
  mode: eval
  generation:
    max_new_tokens: 1024
    do_sample: false
    temperature: 0.0
    early_stopping: true
    use_cache: true
  interaction:
    batch_size: 16
    max_turns: 1
    max_obs_length: 2048
